name: Zig Build

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runs-on: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: mlugg/setup-zig@v2
        with:
          version: master
      - name: Build Summary
        run: zig build --summary all -freference-trace
      - name: Build Summary - Zig Package
        run: zig build --build-file $PWD/test_zigpkg/build.zig --summary all -freference-trace
